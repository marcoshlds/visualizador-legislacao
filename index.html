<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📜 Conversor de Legislação Municipal</title>
<style>
  :root {
    --bg: #f5f3ee;
    --paper: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #555;
    --accent: #8B4513;
    --accent-light: #a0522d;
    --border: #d4cfc5;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --header-bg: #2c3e50;
    --header-text: #ecf0f1;
    --toc-bg: #f8f9fa;
    --hover-bg: #e8e4dc;
    --title-color: #6b2d0f;
    --chapter-color: #4a3728;
    --section-color: #5d4e37;
    --article-bg: #faf9f7;
    --article-border: #e0dbd0;
    --paragraph-bg: #f5f3ee;
    --inciso-bg: #f0ede8;
    --alinea-bg: #ebe8e2;
  }

  [data-theme="dark"] {
    --bg: #1a1a1a;
    --paper: #242424;
    --text: #e0e0e0;
    --text-secondary: #999;
    --accent: #c4956a;
    --accent-light: #d4a574;
    --border: #3a3a3a;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --header-bg: #1a1a2e;
    --header-text: #e0e0e0;
    --toc-bg: #2a2a2a;
    --hover-bg: #333;
    --title-color: #d4a574;
    --chapter-color: #c4956a;
    --section-color: #b8956a;
    --article-bg: #2a2a2a;
    --article-border: #3a3a3a;
    --paragraph-bg: #2d2d2d;
    --inciso-bg: #303030;
    --alinea-bg: #333333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Times New Roman', 'Noto Serif', serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  .header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-size: 1.2rem;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .header-controls {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .header-controls button {
    padding: 0.35rem 0.7rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: var(--header-text);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: all 0.15s;
  }

  .header-controls button:hover {
    background: rgba(255,255,255,0.2);
  }

  .drop-zone-container {
    padding: 2rem;
    text-align: center;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    max-width: 600px;
    margin: 0 auto;
    transition: all 0.2s;
    cursor: pointer;
    background: var(--bg);
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--hover-bg);
  }

  .drop-zone input { display: none; }

  .drop-zone-icon {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }

  .drop-zone-text {
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .file-name {
    margin-top: 0.75rem;
    font-weight: 600;
    color: var(--text);
    font-size: 0.9rem;
  }

  .layout {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
  }

  .toc-sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--toc-bg);
    border-right: 1px solid var(--border);
    max-height: calc(100vh - 60px);
    overflow-y: auto;
    position: sticky;
    top: 60px;
    padding: 1rem 0;
    font-size: 0.85rem;
  }

  .toc-sidebar h3 {
    padding: 0 1rem 0.5rem;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }

  .toc-item {
    padding: 0.3rem 1rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .toc-item:hover {
    background: var(--hover-bg);
    border-left-color: var(--accent);
  }

  .toc-item.titulo { font-weight: 700; color: var(--title-color); padding-left: 0.8rem; }
  .toc-item.capitulo { font-weight: 600; color: var(--chapter-color); padding-left: 1.2rem; font-size: 0.82rem; }
  .toc-item.secao { font-weight: 500; color: var(--section-color); padding-left: 1.6rem; font-size: 0.8rem; }
  .toc-item.subsecao { padding-left: 2rem; font-size: 0.78rem; }
  .toc-item.artigo { padding-left: 2rem; font-size: 0.78rem; color: var(--text-secondary); }
  .toc-item.anexo { padding-left: 1.2rem; font-size: 0.82rem; font-weight: 600; color: var(--accent); }

  .document-container {
    flex: 1;
    padding: 2rem;
    max-width: 900px;
  }

  .paper {
    background: var(--paper);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 3rem 3.5rem;
    min-height: 600px;
  }

  @media (max-width: 1024px) {
    .toc-sidebar { display: none; }
    .document-container { padding: 1rem; }
    .paper { padding: 1.5rem; }
  }

  @media (max-width: 640px) {
    .paper { padding: 1rem; }
    .header { padding: 0.8rem; }
    .header h1 { font-size: 0.95rem; }
    .header-controls button { font-size: 0.75rem; padding: 0.3rem 0.5rem; }
  }

  .leg-titulo {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--title-color);
    text-align: center;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--accent);
    scroll-margin-top: 80px;
  }

  .leg-capitulo {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--chapter-color);
    text-align: center;
    margin: 2rem 0 0.8rem;
    scroll-margin-top: 80px;
  }

  .leg-secao {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--section-color);
    text-align: center;
    margin: 1.5rem 0 0.6rem;
    font-style: italic;
    scroll-margin-top: 80px;
  }

  .leg-subsecao {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    margin: 1.2rem 0 0.5rem;
    scroll-margin-top: 80px;
  }

  .leg-artigo {
    margin: 1.2rem 0;
    padding: 1rem 1.2rem;
    background: var(--article-bg);
    border-left: 4px solid var(--accent);
    border-radius: 0 6px 6px 0;
    scroll-margin-top: 80px;
  }

  .leg-artigo-header {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.3rem;
    font-size: 1.05rem;
  }

  .leg-paragrafo {
    margin: 0.8rem 0 0.8rem 1.5rem;
    padding: 0.6rem 0.8rem;
    background: var(--paragraph-bg);
    border-radius: 4px;
    border-left: 2px solid var(--border);
  }

  .leg-paragrafo-header {
    font-weight: 600;
    color: var(--accent-light);
  }

  .leg-inciso {
    margin: 0.5rem 0 0.5rem 2rem;
    padding: 0.4rem 0.6rem;
    background: var(--inciso-bg);
    border-radius: 4px;
  }

  .leg-inciso-header {
    font-weight: 600;
    color: var(--text);
  }

  .leg-alinea {
    margin: 0.3rem 0 0.3rem 3rem;
    padding: 0.3rem 0.5rem;
    background: var(--alinea-bg);
    border-radius: 3px;
  }

  .leg-alinea-header {
    font-weight: 500;
    color: var(--text-secondary);
  }

  .leg-subalinea {
    margin: 0.2rem 0 0.2rem 4rem;
    padding: 0.2rem 0.4rem;
  }

  .leg-texto {
    text-align: justify;
    hyphens: auto;
  }

  .leg-ementa {
    font-style: italic;
    text-align: center;
    margin: 1rem 2rem;
    padding: 1rem;
    border-left: 3px solid var(--accent);
    background: var(--article-bg);
  }

  .leg-preambulo {
    text-align: justify;
    margin: 1rem 0;
    font-style: italic;
  }

  .leg-anexo {
    margin: 2rem 0;
    padding: 1.5rem;
    background: var(--article-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    scroll-margin-top: 80px;
  }

  .leg-anexo-header {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--title-color);
    text-align: center;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .leg-assinatura {
    margin-top: 2rem;
    text-align: center;
    font-style: italic;
  }

  .leg-data {
    text-align: center;
    margin: 1rem 0;
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    padding: 4rem 2rem;
  }

  .empty-state .icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }

  @media print {
    .header, .toc-sidebar, .drop-zone-container { display: none !important; }
    .paper { box-shadow: none; padding: 0; background: white; }
    body { background: white; }
    .leg-artigo, .leg-paragrafo, .leg-inciso, .leg-alinea {
      background: transparent !important;
      border-left: 1px solid #ccc !important;
    }
  }

  .fs-small { font-size: 0.9rem; }
  .fs-medium { font-size: 1.05rem; }
  .fs-large { font-size: 1.2rem; }

  html { scroll-behavior: smooth; }
</style>
<base target="_blank">

<body>

<div class="header">
  <h1>📜 Conversor de Legislação Municipal</h1>
  <div class="header-controls">
    <button id="btnSmall" title="Fonte pequena">🔤 A-</button>
    <button id="btnMedium" title="Fonte média">🔤 A</button>
    <button id="btnLarge" title="Fonte grande">🔤 A+</button>
    <button id="themeBtn" title="Alternar tema">🌙 Escuro</button>
    <button id="btnPrint" title="Imprimir">🖨️ Imprimir</button>
    <button id="btnOpen" title="Carregar arquivo">📁 Abrir</button>
  </div>
</div>

<div class="drop-zone-container" id="dropZoneContainer">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".txt,.html,.htm,.mht,.mhtml">
    <div class="drop-zone-icon">📂</div>
    <div class="drop-zone-text">
      <strong>Arraste um arquivo aqui</strong> ou clique para navegar<br>
      <small>Suporta .txt, .html, .htm, .mht, .mhtml</small>
    </div>
    <div class="file-name" id="fileName"></div>
  </div>
</div>

<div class="layout">
  <nav class="toc-sidebar" id="tocSidebar" style="display:none;">
    <h3>📑 Índice</h3>
    <div id="tocContent"></div>
  </nav>

  <div class="document-container">
    <div class="paper fs-medium" id="paper">
      <div class="empty-state" id="emptyState">
        <div class="icon">📄</div>
        <p><strong>Nenhum documento carregado.</strong><br>
        Arraste um arquivo de legislação ou clique em "Abrir" para começar.</p>
      </div>
      <div id="content" style="display: none;"></div>
    </div>
  </div>
</div>

<script>

// ===== PARSER ENGINE =====

class LegislationParser {
  constructor() {
    this.elements = [];
    this.toc = [];
  }

  parse(rawText) {
    this.elements = [];
    this.toc = [];

    let text = this.preprocess(rawText);
    let lines = this.splitAndMergeLines(text);
    this.parseStructure(lines);

    return { elements: this.elements, toc: this.toc };
  }

  preprocess(rawText) {
    const isHTML = /<(html|body|table|font|p|div|br)[\s>]/i.test(rawText);

    if (isHTML) {
      return this.extractTextFromHTML(rawText);
    }

    const textarea = document.createElement('textarea');
    textarea.innerHTML = rawText;
    return textarea.value;
  }

  extractTextFromHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('script, style').forEach(el => el.remove());
    let text = doc.body.innerText || doc.body.textContent || '';
    const textarea = document.createElement('textarea');
    textarea.innerHTML = text;
    return textarea.value;
  }

  splitAndMergeLines(text) {
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    let merged = [];
    let i = 0;
    while (i < lines.length) {
      let line = lines[i];

      if (i + 1 < lines.length) {
        const next = lines[i + 1];
        const next2 = lines[i + 2] || '';

        // CAPITULO + Roman + Title
        if (/^CAP[\u00cdI]TULO$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          if (i < lines.length && !this.isStructural(lines[i])) {
            line += ' ' + lines[i];
            i++;
          }
          merged.push(line);
          continue;
        }

        // SECAO + Roman + Title
        if (/^SE[\u00c7C][\u00c3A]O$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          if (i < lines.length && !this.isStructural(lines[i])) {
            line += ' ' + lines[i];
            i++;
          }
          merged.push(line);
          continue;
        }

        // SUBSECAO + Roman + Title
        if (/^SUBSE[\u00c7C][\u00c3A]O$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          if (i < lines.length && !this.isStructural(lines[i])) {
            line += ' ' + lines[i];
            i++;
          }
          merged.push(line);
          continue;
        }

        // TITULO + Roman
        if (/^T[\u00cdI]TULO$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          if (i < lines.length && !this.isStructural(lines[i])) {
            line += ' ' + lines[i];
            i++;
          }
          merged.push(line);
          continue;
        }

        // Art. + number
        if (/^Art\.$/i.test(line) && /^\d+/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          merged.push(line);
          continue;
        }

        // section symbol + number
        if (/^\u00a7$/i.test(line) && /^\d+/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          merged.push(line);
          continue;
        }
      }

      merged.push(line);
      i++;
    }

    return merged;
  }

  isStructural(line) {
    return /^(T[\u00cdI]TULO|CAP[\u00cdI]TULO|SE[\u00c7C][\u00c3A]O|SUBSE[\u00c7C][\u00c3A]O|Art\.|ANEXO)/i.test(line);
  }

  parseStructure(lines) {
    let i = 0;
    let currentTitle = null;
    let currentChapter = null;
    let currentSection = null;
    let currentSubsection = null;
    let currentArticle = null;
    let currentParagraph = null;
    let currentInciso = null;

    // Extract metadata
    let title = '';
    let ementa = [];
    let preambulo = [];
    let inEmenta = false;
    let metadataEnd = 0;

    for (let j = 0; j < Math.min(20, lines.length); j++) {
      if (/^LEI\s+N[\u00ba\u00b0]\s*\d+/i.test(lines[j])) {
        title = lines[j];
        metadataEnd = j + 1;
        break;
      }
    }

    for (let j = metadataEnd; j < Math.min(30, lines.length); j++) {
      if (lines[j].startsWith('\u201c') || lines[j].startsWith('\u2018') || lines[j].startsWith('"')) {
        inEmenta = true;
      }
      if (inEmenta) {
        ementa.push(lines[j]);
        if (lines[j].endsWith('\u201d') || lines[j].endsWith('\u2019') || lines[j].endsWith('"')) {
          inEmenta = false;
          metadataEnd = j + 1;
          break;
        }
      }
    }

    for (let j = metadataEnd; j < lines.length; j++) {
      if (/^T[\u00cdI]TULO\s+[IVX]/i.test(lines[j]) || /^Art\.\s*\d+/i.test(lines[j])) {
        break;
      }
      if (lines[j].length > 20 && !this.isStructural(lines[j])) {
        preambulo.push(lines[j]);
      }
    }

    if (title) {
      this.addElement('titulo-documento', title, { level: 0 });
    }
    if (ementa.length > 0) {
      this.addElement('ementa', ementa.join(' '));
    }
    if (preambulo.length > 0) {
      this.addElement('preambulo', preambulo.join(' '));
    }

    // Parse legislative structure
    for (i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      if (i < metadataEnd && (line === title || ementa.some(e => line.includes(e)))) continue;

      // TITULO
      const tituloMatch = line.match(/^T[\u00cdI]TULO\s+([IVX\d]+)\s*(.*)/i);
      if (tituloMatch) {
        currentTitle = tituloMatch[1];
        const tituloText = tituloMatch[2] ? tituloMatch[2].trim() : '';
        this.addElement('titulo', line, { 
          numero: currentTitle, 
          texto: tituloText,
          id: 'titulo-' + currentTitle
        });
        currentChapter = null;
        currentSection = null;
        currentSubsection = null;
        continue;
      }

      // CAPITULO
      const capMatch = line.match(/^CAP[\u00cdI]TULO\s+([IVX\d]+)\s*(.*)/i);
      if (capMatch) {
        currentChapter = capMatch[1];
        const capText = capMatch[2] ? capMatch[2].trim() : '';
        this.addElement('capitulo', line, { 
          numero: currentChapter, 
          texto: capText,
          id: 'cap-' + (currentTitle || '0') + '-' + currentChapter
        });
        currentSection = null;
        currentSubsection = null;
        continue;
      }

      // SECAO
      const secMatch = line.match(/^SE[\u00c7C][\u00c3A]O\s+([IVX\d]+)\s*(.*)/i);
      if (secMatch) {
        currentSection = secMatch[1];
        const secText = secMatch[2] ? secMatch[2].trim() : '';
        this.addElement('secao', line, { 
          numero: currentSection, 
          texto: secText,
          id: 'sec-' + (currentTitle || '0') + '-' + (currentChapter || '0') + '-' + currentSection
        });
        currentSubsection = null;
        continue;
      }

      // SUBSECAO
      const subsecMatch = line.match(/^SUBSE[\u00c7C][\u00c3A]O\s+([IVX\d]+)\s*(.*)/i);
      if (subsecMatch) {
        currentSubsection = subsecMatch[1];
        const subsecText = subsecMatch[2] ? subsecMatch[2].trim() : '';
        this.addElement('subsecao', line, { 
          numero: currentSubsection, 
          texto: subsecText,
          id: 'subsec-' + (currentTitle || '0') + '-' + (currentChapter || '0') + '-' + (currentSection || '0') + '-' + currentSubsection
        });
        continue;
      }

      // ARTIGO
      const artMatch = line.match(/^Art\.\s*(\d+[\u00ba\u00b0]?)\s*(.*)/i);
      if (artMatch) {
        const artNum = artMatch[1];
        const artText = artMatch[2] ? artMatch[2].trim() : '';
        currentArticle = artNum;
        this.addElement('artigo', line, { 
          numero: artNum, 
          texto: artText,
          id: 'art-' + artNum.replace(/[\u00ba\u00b0]/g, '')
        });
        currentParagraph = null;
        currentInciso = null;
        continue;
      }

      // PARAGRAFO UNICO
      const paragUnicoMatch = line.match(/^(Par[\u00e1a]grafo\s+[\u00fanu]nico)\.?\s*(.*)/i);
      if (paragUnicoMatch) {
        const paragText = paragUnicoMatch[2] ? paragUnicoMatch[2].trim() : '';
        currentParagraph = 'unico';
        this.addElement('paragrafo', line, { 
          numero: '\u00fanico', 
          texto: paragText,
          id: 'parag-' + (currentArticle || '0') + '-unico'
        });
        currentInciso = null;
        continue;
      }

      // PARAGRAFO (section symbol)
      const paragMatch = line.match(/^\u00a7\s*(\d+[\u00ba\u00b0]?)\s*(.*)/);
      if (paragMatch) {
        const paragNum = paragMatch[1];
        const paragText = paragMatch[2] ? paragMatch[2].trim() : '';
        currentParagraph = paragNum;
        this.addElement('paragrafo', line, { 
          numero: paragNum, 
          texto: paragText,
          id: 'parag-' + (currentArticle || '0') + '-' + paragNum.replace(/[\u00ba\u00b0]/g, '')
        });
        currentInciso = null;
        continue;
      }

      // INCISO (Roman numerals with dash)
      const incisoMatch = line.match(/^([IVX]+)\s*[-\u2013\u2014]\s*(.*)/);
      if (incisoMatch && incisoMatch[2].length > 3) {
        const incisoNum = incisoMatch[1];
        const incisoText = incisoMatch[2].trim();
        currentInciso = incisoNum;
        this.addElement('inciso', line, { 
          numero: incisoNum, 
          texto: incisoText,
          id: 'inciso-' + (currentArticle || '0') + '-' + incisoNum
        });
        continue;
      }

      // ALINEA (lowercase letter with parenthesis)
      const alineaMatch = line.match(/^([a-z])\)\s*(.*)/);
      if (alineaMatch && alineaMatch[2].length > 3) {
        const alineaNum = alineaMatch[1];
        const alineaText = alineaMatch[2].trim();
        this.addElement('alinea', line, { 
          numero: alineaNum, 
          texto: alineaText,
          id: 'alinea-' + (currentArticle || '0') + '-' + (currentInciso || '0') + '-' + alineaNum
        });
        continue;
      }

      // SUBALINEA
      const subalineaMatch = line.match(/^([a-z]{2,})\)\s*(.*)/);
      if (subalineaMatch && subalineaMatch[2].length > 3) {
        const subalineaNum = subalineaMatch[1];
        const subalineaText = subalineaMatch[2].trim();
        this.addElement('subalinea', line, { 
          numero: subalineaNum, 
          texto: subalineaText 
        });
        continue;
      }

      // ANEXO
      const anexoMatch = line.match(/^(ANEXO\s+[IVX\d-]+[AB]?)\s*(.*)/i);
      if (anexoMatch) {
        const anexoNum = anexoMatch[1];
        const anexoText = anexoMatch[2] ? anexoMatch[2].trim() : '';
        this.addElement('anexo', line, { 
          numero: anexoNum, 
          texto: anexoText,
          id: 'anexo-' + anexoNum.replace(/\s+/g, '-').toLowerCase()
        });
        continue;
      }

      // ASSINATURA / DATA (near end)
      if (i > lines.length - 20 && (/^(Prefeitura|Publicado|Ref\.)/i.test(line) || /^[A-Z][a-z]+\s+[A-Z][a-z]+$/.test(line) && line.length < 40)) {
        this.addElement('assinatura', line);
        continue;
      }

      // Regular text
      if (this.elements.length > 0) {
        const last = this.elements[this.elements.length - 1];
        if (last.type === 'texto') {
          last.content += ' ' + line;
        } else {
          this.addElement('texto', line);
        }
      } else {
        this.addElement('texto', line);
      }
    }
  }

  addElement(type, content, meta) {
    meta = meta || {};
    const el = Object.assign({ type: type, content: content }, meta);
    this.elements.push(el);

    if (['titulo', 'capitulo', 'secao', 'subsecao', 'artigo', 'anexo'].includes(type)) {
      this.toc.push({
        type: type,
        label: this.getTOCLabel(el),
        id: meta.id || '',
        level: this.getTOCLevel(type)
      });
    }
  }

  getTOCLabel(el) {
    switch(el.type) {
      case 'titulo': return '\ud83d\udcd6 ' + el.content;
      case 'capitulo': return '\ud83d\udcc2 ' + el.content;
      case 'secao': return '\ud83d\udcc1 ' + el.content;
      case 'subsecao': return '\ud83d\udcc4 ' + el.content;
      case 'artigo': return '\u00a7 Art. ' + el.numero;
      case 'anexo': return '\ud83d\udcce ' + el.content;
      default: return el.content;
    }
  }

  getTOCLevel(type) {
    const levels = { titulo: 0, capitulo: 1, secao: 2, subsecao: 3, artigo: 4, anexo: 1 };
    return levels[type] || 5;
  }
}

// ===== RENDERER =====

function renderDocument(data) {
  const contentEl = document.getElementById('content');
  const tocContent = document.getElementById('tocContent');
  const tocSidebar = document.getElementById('tocSidebar');

  let html = '';
  let tocHtml = '';

  data.elements.forEach(function(el) {
    switch(el.type) {
      case 'titulo-documento':
        html += '<h1 class="leg-titulo" style="margin-top:0;">' + escapeHtml(el.content) + '</h1>';
        break;
      case 'titulo':
        html += '<h2 class="leg-titulo" id="' + el.id + '">' + escapeHtml(el.content) + '</h2>';
        break;
      case 'capitulo':
        html += '<h3 class="leg-capitulo" id="' + el.id + '">' + escapeHtml(el.content) + '</h3>';
        break;
      case 'secao':
        html += '<h4 class="leg-secao" id="' + el.id + '">' + escapeHtml(el.content) + '</h4>';
        break;
      case 'subsecao':
        html += '<h5 class="leg-subsecao" id="' + el.id + '">' + escapeHtml(el.content) + '</h5>';
        break;
      case 'ementa':
        html += '<div class="leg-ementa">' + escapeHtml(el.content) + '</div>';
        break;
      case 'preambulo':
        html += '<div class="leg-preambulo">' + escapeHtml(el.content) + '</div>';
        break;
      case 'artigo':
        html += '<div class="leg-artigo" id="' + el.id + '">' +
          '<div class="leg-artigo-header">Art. ' + escapeHtml(el.numero) + '</div>' +
          '<div class="leg-texto">' + escapeHtml(el.texto || el.content.replace(/^Art\.\s*\d+[\u00ba\u00b0]?\s*/, '')) + '</div>' +
          '</div>';
        break;
      case 'paragrafo':
        html += '<div class="leg-paragrafo" id="' + el.id + '">' +
          '<span class="leg-paragrafo-header">\u00a7 ' + escapeHtml(el.numero) + '</span> ' +
          '<span class="leg-texto">' + escapeHtml(el.texto || el.content.replace(/^\u00a7\s*\d+[\u00ba\u00b0]?\s*/, '').replace(/^Par[\u00e1a]grafo\s+[\u00fanu]nico\.?\s*/, '')) + '</span>' +
          '</div>';
        break;
      case 'inciso':
        html += '<div class="leg-inciso" id="' + el.id + '">' +
          '<span class="leg-inciso-header">' + escapeHtml(el.numero) + ' \u2013</span> ' +
          '<span class="leg-texto">' + escapeHtml(el.texto || el.content.replace(/^[IVX]+\s*[-\u2013\u2014]\s*/, '')) + '</span>' +
          '</div>';
        break;
      case 'alinea':
        html += '<div class="leg-alinea">' +
          '<span class="leg-alinea-header">' + escapeHtml(el.numero) + ')</span> ' +
          '<span class="leg-texto">' + escapeHtml(el.texto || el.content.replace(/^[a-z]\)\s*/, '')) + '</span>' +
          '</div>';
        break;
      case 'subalinea':
        html += '<div class="leg-subalinea">' +
          '<span class="leg-alinea-header">' + escapeHtml(el.numero) + ')</span> ' +
          '<span class="leg-texto">' + escapeHtml(el.texto || el.content.replace(/^[a-z]{2,}\)\s*/, '')) + '</span>' +
          '</div>';
        break;
      case 'anexo':
        html += '<div class="leg-anexo" id="' + el.id + '">' +
          '<div class="leg-anexo-header">' + escapeHtml(el.content) + '</div>' +
          '</div>';
        break;
      case 'assinatura':
        html += '<div class="leg-assinatura">' + escapeHtml(el.content) + '</div>';
        break;
      case 'texto':
        html += '<p class="leg-texto">' + escapeHtml(el.content) + '</p>';
        break;
    }
  });

  data.toc.forEach(function(item) {
    tocHtml += '<div class="toc-item ' + item.type + '" onclick="scrollToElement(\'' + item.id + '\')" title="' + escapeHtml(item.label) + '">' + escapeHtml(item.label) + '</div>';
  });

  contentEl.innerHTML = html;
  tocContent.innerHTML = tocHtml;

  if (data.toc.length > 0) {
    tocSidebar.style.display = 'block';
  }
}

function escapeHtml(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function scrollToElement(id) {
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ===== UI CONTROLS =====

document.addEventListener('DOMContentLoaded', function() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const contentEl = document.getElementById('content');
  const emptyState = document.getElementById('emptyState');
  const dropZoneContainer = document.getElementById('dropZoneContainer');
  const paper = document.getElementById('paper');

  // Drag & drop
  dropZone.addEventListener('click', function() { fileInput.click(); });

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      handleFile(e.dataTransfer.files[0]);
    }
  });

  fileInput.addEventListener('change', function(e) {
    if (e.target.files.length) {
      handleFile(e.target.files[0]);
    }
  });

  function handleFile(file) {
    fileName.textContent = '\ud83d\udcc4 ' + file.name;
    const reader = new FileReader();

    reader.onload = function(e) {
      try {
        const parser = new LegislationParser();
        const data = parser.parse(e.target.result);

        emptyState.style.display = 'none';
        contentEl.style.display = 'block';
        dropZoneContainer.style.display = 'none';

        renderDocument(data);
      } catch (err) {
        console.error(err);
        alert('Erro ao processar arquivo: ' + err.message);
      }
    };

    reader.readAsText(file);
  }

  // Button handlers
  document.getElementById('btnSmall').addEventListener('click', function() {
    paper.classList.remove('fs-small', 'fs-medium', 'fs-large');
    paper.classList.add('fs-small');
  });

  document.getElementById('btnMedium').addEventListener('click', function() {
    paper.classList.remove('fs-small', 'fs-medium', 'fs-large');
    paper.classList.add('fs-medium');
  });

  document.getElementById('btnLarge').addEventListener('click', function() {
    paper.classList.remove('fs-small', 'fs-medium', 'fs-large');
    paper.classList.add('fs-large');
  });

  document.getElementById('themeBtn').addEventListener('click', function() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    this.textContent = isDark ? '\ud83c\udf19 Escuro' : '\u2600\ufe0f Claro';
  });

  document.getElementById('btnPrint').addEventListener('click', function() {
    window.print();
  });

  document.getElementById('btnOpen').addEventListener('click', function() {
    fileInput.click();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'o') {
        e.preventDefault();
        fileInput.click();
      } else if (e.key === 'p') {
        e.preventDefault();
        window.print();
      }
    }
  });
});
</script>
