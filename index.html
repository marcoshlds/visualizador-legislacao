<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📜 Conversor de Legislação Municipal</title>
<style>
  :root {
    --bg: #f5f3ee;
    --paper: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #555;
    --accent: #8B4513;
    --accent-light: #a0522d;
    --border: #d4cfc5;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --header-bg: #2c3e50;
    --header-text: #ecf0f1;
    --toc-bg: #f8f9fa;
    --hover-bg: #e8e4dc;
    --title-color: #6b2d0f;
    --chapter-color: #4a3728;
    --section-color: #5d4e37;
    --article-bg: #faf9f7;
    --article-border: #e0dbd0;
    --paragraph-bg: #f5f3ee;
    --inciso-bg: #f0ede8;
    --alinea-bg: #ebe8e2;
  }

  [data-theme="dark"] {
    --bg: #1a1a1a;
    --paper: #242424;
    --text: #e0e0e0;
    --text-secondary: #999;
    --accent: #c4956a;
    --accent-light: #d4a574;
    --border: #3a3a3a;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --header-bg: #1a1a2e;
    --header-text: #e0e0e0;
    --toc-bg: #2a2a2a;
    --hover-bg: #333;
    --title-color: #d4a574;
    --chapter-color: #c4956a;
    --section-color: #b8956a;
    --article-bg: #2a2a2a;
    --article-border: #3a3a3a;
    --paragraph-bg: #2d2d2d;
    --inciso-bg: #303030;
    --alinea-bg: #333333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Times New Roman', 'Noto Serif', serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* Header */
  .header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 1.5rem 2rem;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header h1 {
    font-size: 1.3rem;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .header-controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .header-controls button {
    padding: 0.4rem 0.8rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: var(--header-text);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.15s;
  }

  .header-controls button:hover {
    background: rgba(255,255,255,0.2);
  }

  /* Drop Zone */
  .drop-zone-container {
    padding: 2rem;
    text-align: center;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    max-width: 600px;
    margin: 0 auto;
    transition: all 0.2s;
    cursor: pointer;
    background: var(--bg);
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--hover-bg);
  }

  .drop-zone input { display: none; }

  .drop-zone-icon {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }

  .drop-zone-text {
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .file-name {
    margin-top: 0.75rem;
    font-weight: 600;
    color: var(--text);
    font-size: 0.9rem;
  }

  /* TOC Sidebar */
  .layout {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
  }

  .toc-sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--toc-bg);
    border-right: 1px solid var(--border);
    max-height: calc(100vh - 70px);
    overflow-y: auto;
    position: sticky;
    top: 70px;
    padding: 1rem 0;
  }

  .toc-sidebar h3 {
    padding: 0 1rem 0.5rem;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }

  .toc-item {
    padding: 0.35rem 1rem;
    cursor: pointer;
    font-size: 0.85rem;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toc-item:hover {
    background: var(--hover-bg);
    border-left-color: var(--accent);
  }

  .toc-item.titulo { font-weight: 700; color: var(--title-color); padding-left: 1rem; }
  .toc-item.capitulo { font-weight: 600; color: var(--chapter-color); padding-left: 1.5rem; }
  .toc-item.secao { font-weight: 500; color: var(--section-color); padding-left: 2rem; font-size: 0.8rem; }
  .toc-item.subsecao { padding-left: 2.5rem; font-size: 0.78rem; }
  .toc-item.artigo { padding-left: 2.5rem; font-size: 0.78rem; color: var(--text-secondary); }

  /* Document */
  .document-container {
    flex: 1;
    padding: 2rem;
    max-width: 900px;
  }

  .paper {
    background: var(--paper);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 3rem 3.5rem;
    min-height: 600px;
  }

  @media (max-width: 1024px) {
    .toc-sidebar { display: none; }
    .document-container { padding: 1rem; }
    .paper { padding: 1.5rem; }
  }

  @media (max-width: 640px) {
    .paper { padding: 1rem; }
    .header { padding: 1rem; }
    .header h1 { font-size: 1rem; }
  }

  /* Legislative Elements */
  .leg-titulo {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--title-color);
    text-align: center;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--accent);
    scroll-margin-top: 80px;
  }

  .leg-capitulo {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--chapter-color);
    text-align: center;
    margin: 2rem 0 0.8rem;
    scroll-margin-top: 80px;
  }

  .leg-secao {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--section-color);
    text-align: center;
    margin: 1.5rem 0 0.6rem;
    font-style: italic;
    scroll-margin-top: 80px;
  }

  .leg-subsecao {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    margin: 1.2rem 0 0.5rem;
    scroll-margin-top: 80px;
  }

  .leg-artigo {
    margin: 1.2rem 0;
    padding: 1rem 1.2rem;
    background: var(--article-bg);
    border-left: 4px solid var(--accent);
    border-radius: 0 6px 6px 0;
    scroll-margin-top: 80px;
  }

  .leg-artigo-header {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }

  .leg-paragrafo {
    margin: 0.8rem 0 0.8rem 1.5rem;
    padding: 0.6rem 0.8rem;
    background: var(--paragraph-bg);
    border-radius: 4px;
    border-left: 2px solid var(--border);
  }

  .leg-paragrafo-header {
    font-weight: 600;
    color: var(--accent-light);
  }

  .leg-inciso {
    margin: 0.5rem 0 0.5rem 2rem;
    padding: 0.4rem 0.6rem;
    background: var(--inciso-bg);
    border-radius: 4px;
  }

  .leg-inciso-header {
    font-weight: 600;
    color: var(--text);
    display: inline;
  }

  .leg-alinea {
    margin: 0.3rem 0 0.3rem 3rem;
    padding: 0.3rem 0.5rem;
    background: var(--alinea-bg);
    border-radius: 3px;
  }

  .leg-alinea-header {
    font-weight: 500;
    color: var(--text-secondary);
    display: inline;
  }

  .leg-subalinea {
    margin: 0.2rem 0 0.2rem 4rem;
    padding: 0.2rem 0.4rem;
  }

  .leg-texto {
    text-align: justify;
    hyphens: auto;
  }

  .leg-ementa {
    font-style: italic;
    text-align: center;
    margin: 1rem 2rem;
    padding: 1rem;
    border-left: 3px solid var(--accent);
    background: var(--article-bg);
  }

  .leg-preambulo {
    text-align: justify;
    margin: 1rem 0;
    font-style: italic;
  }

  .leg-anexo {
    margin: 2rem 0;
    padding: 1.5rem;
    background: var(--article-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    scroll-margin-top: 80px;
  }

  .leg-anexo-header {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--title-color);
    text-align: center;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .leg-assinatura {
    margin-top: 2rem;
    text-align: center;
    font-style: italic;
  }

  .leg-data {
    text-align: center;
    margin: 1rem 0;
    font-weight: 600;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    padding: 4rem 2rem;
  }

  .empty-state .icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }

  /* Print */
  @media print {
    .header, .toc-sidebar, .drop-zone-container { display: none !important; }
    .paper { box-shadow: none; padding: 0; background: white; }
    body { background: white; }
    .leg-artigo, .leg-paragrafo, .leg-inciso, .leg-alinea { 
      background: transparent !important; 
      border-left: 1px solid #ccc !important;
    }
  }

  /* Search highlight */
  .highlight {
    background: #ffeb3b;
    color: #000;
    padding: 0 2px;
    border-radius: 2px;
  }

  [data-theme="dark"] .highlight {
    background: #b8860b;
    color: #fff;
  }

  /* Font size classes */
  .fs-small { font-size: 0.9rem; }
  .fs-medium { font-size: 1.05rem; }
  .fs-large { font-size: 1.2rem; }

  /* Smooth scroll */
  html { scroll-behavior: smooth; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary);
  }
  .loading::after {
    content: "⏳";
    display: block;
    font-size: 2rem;
    margin-top: 0.5rem;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📜 Conversor de Legislação Municipal</h1>
  <div class="header-controls">
    <button onclick="setFontSize('small')" title="Fonte pequena">🔤 A-</button>
    <button onclick="setFontSize('medium')" title="Fonte média" id="btnMedium">🔤 A</button>
    <button onclick="setFontSize('large')" title="Fonte grande">🔤 A+</button>
    <button onclick="toggleTheme()" title="Alternar tema" id="themeBtn">🌙 Escuro</button>
    <button onclick="window.print()" title="Imprimir">🖨️ Imprimir</button>
    <button onclick="document.getElementById('fileInput').click()" title="Carregar arquivo">📁 Abrir</button>
  </div>
</div>

<div class="drop-zone-container" id="dropZoneContainer">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".txt,.html,.htm,.mht,.mhtml">
    <div class="drop-zone-icon">📂</div>
    <div class="drop-zone-text">
      <strong>Arraste um arquivo aqui</strong> ou clique para navegar<br>
      <small>Suporta .txt, .html, .htm, .mht, .mhtml</small>
    </div>
    <div class="file-name" id="fileName"></div>
  </div>
</div>

<div class="layout">
  <nav class="toc-sidebar" id="tocSidebar" style="display:none;">
    <h3>📑 Índice</h3>
    <div id="tocContent"></div>
  </nav>
  
  <div class="document-container">
    <div class="paper" id="paper">
      <div class="empty-state" id="emptyState">
        <div class="icon">📄</div>
        <p><strong>Nenhum documento carregado.</strong><br>
        Arraste um arquivo de legislação ou clique em "Abrir" para começar.</p>
      </div>
      <div id="content" style="display: none;"></div>
    </div>
  </div>
</div>

<script>
// ===== PARSER ENGINE =====

class LegislationParser {
  constructor() {
    this.elements = [];
    this.toc = [];
  }

  parse(rawText) {
    this.elements = [];
    this.toc = [];
    
    // Step 1: Detect and handle HTML
    let text = this.preprocess(rawText);
    
    // Step 2: Split into logical lines
    let lines = this.splitLines(text);
    
    // Step 3: Parse structure
    this.parseStructure(lines);
    
    return { elements: this.elements, toc: this.toc };
  }

  preprocess(rawText) {
    // Detect if HTML
    const isHTML = /<(html|body|table|font|p|div|br)[\s>]/i.test(rawText);
    
    if (isHTML) {
      return this.extractTextFromHTML(rawText);
    }
    
    // Plain text: decode HTML entities
    const textarea = document.createElement('textarea');
    textarea.innerHTML = rawText;
    return textarea.value;
  }

  extractTextFromHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // Remove scripts and styles
    doc.querySelectorAll('script, style').forEach(el => el.remove());
    
    // Get text content
    let text = doc.body.innerText || doc.body.textContent || '';
    
    // Decode HTML entities
    const textarea = document.createElement('textarea');
    textarea.innerHTML = text;
    return textarea.value;
  }

  splitLines(text) {
    // Normalize line endings
    text = text.replace(/\\r\\n/g, '\\n').replace(/\\r/g, '\\n');
    
    // Split and clean
    let lines = text.split('\\n').map(l => l.trim()).filter(l => l.length > 0);
    
    // Merge broken lines (e.g., "CAPÍTULO\\nI\\nDos Princípios")
    let merged = [];
    let i = 0;
    while (i < lines.length) {
      let line = lines[i];
      
      // Check if next lines should be merged
      if (i + 1 < lines.length) {
        const next = lines[i + 1];
        const next2 = lines[i + 2] || '';
        
        // CAPÍTULO + Roman numeral + Title
        if (/^CAP[ÍI]TULO$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next + ' ' + next2;
          i += 3;
          merged.push(line);
          continue;
        }
        
        // SEÇÃO + Roman numeral + Title
        if (/^SE[ÇC][ÃA]O$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next + ' ' + next2;
          i += 3;
          merged.push(line);
          continue;
        }
        
        // SUBSEÇÃO + Roman numeral + Title
        if (/^SUBSE[ÇC][ÃA]O$/i.test(line) && /^[IVX]+$/i.test(next)) {
          line = line + ' ' + next + ' ' + next2;
          i += 3;
          merged.push(line);
          continue;
        }
        
        // TÍTULO + Roman numeral (title might be on same line or next)
        if (/^T[ÍI]TULO$/i.test(line) && /^[IVX]+/i.test(next)) {
          if (/^[IVX]+$/i.test(next)) {
            line = line + ' ' + next;
            i += 2;
            // Check if title follows
            if (i < lines.length && !/^T[ÍI]TULO$/i.test(lines[i]) && !/^CAP[ÍI]TULO$/i.test(lines[i]) && !/^Art\\./i.test(lines[i])) {
              line += ' ' + lines[i];
              i++;
            }
            merged.push(line);
            continue;
          }
        }
        
        // Art. Nº might be split
        if (/^Art\\.$/i.test(line) && /^\\d+/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          merged.push(line);
          continue;
        }
        
        // § Nº might be split
        if (/^§$/i.test(line) && /^\\d+/i.test(next)) {
          line = line + ' ' + next;
          i += 2;
          merged.push(line);
          continue;
        }
      }
      
      merged.push(line);
      i++;
    }
    
    return merged;
  }

  parseStructure(lines) {
    let i = 0;
    let currentTitle = null;
    let currentChapter = null;
    let currentSection = null;
    let currentSubsection = null;
    let currentArticle = null;
    let currentParagraph = null;
    let currentInciso = null;
    
    // First pass: identify document metadata
    let title = '';
    let ementa = [];
    let preambulo = [];
    let inEmenta = false;
    let inPreambulo = false;
    let metadataEnd = 0;
    
    // Find title
    for (let j = 0; j < Math.min(20, lines.length); j++) {
      if (/^LEI\\s+N[º°]\\s*\\d+/i.test(lines[j])) {
        title = lines[j];
        metadataEnd = j + 1;
        break;
      }
    }
    
    // Find ementa (quoted text near beginning)
    for (let j = metadataEnd; j < Math.min(30, lines.length); j++) {
      if (lines[j].startsWith('"') || lines[j].startsWith('\\u201C') || lines[j].startsWith('\\u2018')) {
        inEmenta = true;
      }
      if (inEmenta) {
        ementa.push(lines[j]);
        if (lines[j].endsWith('"') || lines[j].endsWith('\\u201D') || lines[j].endsWith('\\u2019')) {
          inEmenta = false;
          metadataEnd = j + 1;
          break;
        }
      }
    }
    
    // Find preâmbulo (text before first TÍTULO or Art.)
    for (let j = metadataEnd; j < lines.length; j++) {
      if (/^T[ÍI]TULO\\s+[IVX]/i.test(lines[j]) || /^Art\\.\\s*\\d+/i.test(lines[j])) {
        break;
      }
      if (lines[j].length > 20 && !/^CAP[ÍI]TULO/i.test(lines[j])) {
        preambulo.push(lines[j]);
      }
    }
    
    // Add metadata
    if (title) {
      this.addElement('titulo-documento', title, { level: 0 });
    }
    if (ementa.length > 0) {
      this.addElement('ementa', ementa.join(' '));
    }
    if (preambulo.length > 0) {
      this.addElement('preambulo', preambulo.join(' '));
    }
    
    // Second pass: parse legislative structure
    for (i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      
      // Skip already processed metadata
      if (i < metadataEnd && (line === title || ementa.some(e => line.includes(e)))) continue;
      
      // TÍTULO
      const tituloMatch = line.match(/^T[ÍI]TULO\\s+([IVX\\d]+)\\s*(.*)/i);
      if (tituloMatch) {
        currentTitle = tituloMatch[1];
        const tituloText = tituloMatch[2] ? tituloMatch[2].trim() : '';
        this.addElement('titulo', line, { 
          numero: currentTitle, 
          texto: tituloText,
          id: `titulo-${currentTitle}`
        });
        currentChapter = null;
        currentSection = null;
        currentSubsection = null;
        continue;
      }
      
      // CAPÍTULO
      const capMatch = line.match(/^CAP[ÍI]TULO\\s+([IVX\\d]+)\\s*(.*)/i);
      if (capMatch) {
        currentChapter = capMatch[1];
        const capText = capMatch[2] ? capMatch[2].trim() : '';
        this.addElement('capitulo', line, { 
          numero: currentChapter, 
          texto: capText,
          id: `cap-${currentTitle || '0'}-${currentChapter}`
        });
        currentSection = null;
        currentSubsection = null;
        continue;
      }
      
      // SEÇÃO
      const secMatch = line.match(/^SE[ÇC][ÃA]O\\s+([IVX\\d]+)\\s*(.*)/i);
      if (secMatch) {
        currentSection = secMatch[1];
        const secText = secMatch[2] ? secMatch[2].trim() : '';
        this.addElement('secao', line, { 
          numero: currentSection, 
          texto: secText,
          id: `sec-${currentTitle || '0'}-${currentChapter || '0'}-${currentSection}`
        });
        currentSubsection = null;
        continue;
      }
      
      // SUBSEÇÃO
      const subsecMatch = line.match(/^SUBSE[ÇC][ÃA]O\\s+([IVX\\d]+)\\s*(.*)/i);
      if (subsecMatch) {
        currentSubsection = subsecMatch[1];
        const subsecText = subsecMatch[2] ? subsecMatch[2].trim() : '';
        this.addElement('subsecao', line, { 
          numero: currentSubsection, 
          texto: subsecText,
          id: `subsec-${currentTitle || '0'}-${currentChapter || '0'}-${currentSection || '0'}-${currentSubsection}`
        });
        continue;
      }
      
      // ARTIGO
      const artMatch = line.match(/^Art\\.\\s*(\\d+[º°]?)\\s*(.*)/i);
      if (artMatch) {
        const artNum = artMatch[1];
        const artText = artMatch[2] ? artMatch[2].trim() : '';
        currentArticle = artNum;
        this.addElement('artigo', line, { 
          numero: artNum, 
          texto: artText,
          id: `art-${artNum.replace(/[º°]/g, '')}`
        });
        currentParagraph = null;
        currentInciso = null;
        continue;
      }
      
      // PARÁGRAFO ÚNICO
      const paragUnicoMatch = line.match(/^(Parágrafo\\s+único)\\.\\s*(.*)/i);
      if (paragUnicoMatch) {
        const paragText = paragUnicoMatch[2] ? paragUnicoMatch[2].trim() : '';
        currentParagraph = 'unico';
        this.addElement('paragrafo', line, { 
          numero: 'único', 
          texto: paragText,
          id: `parag-${currentArticle || '0'}-unico`
        });
        currentInciso = null;
        continue;
      }
      
      // PARÁGRAFO (§)
      const paragMatch = line.match(/^§\\s*(\\d+[º°]?)\\s*(.*)/);
      if (paragMatch) {
        const paragNum = paragMatch[1];
        const paragText = paragMatch[2] ? paragMatch[2].trim() : '';
        currentParagraph = paragNum;
        this.addElement('paragrafo', line, { 
          numero: paragNum, 
          texto: paragText,
          id: `parag-${currentArticle || '0'}-${paragNum.replace(/[º°]/g, '')}`
        });
        currentInciso = null;
        continue;
      }
      
      // INCISO (Roman numerals with dash)
      const incisoMatch = line.match(/^([IVX]+)\\s*[-–—]\\s*(.*)/);
      if (incisoMatch && incisoMatch[2].length > 5) {
        const incisoNum = incisoMatch[1];
        const incisoText = incisoMatch[2].trim();
        currentInciso = incisoNum;
        this.addElement('inciso', line, { 
          numero: incisoNum, 
          texto: incisoText,
          id: `inciso-${currentArticle || '0'}-${incisoNum}`
        });
        continue;
      }
      
      // ALÍNEA (lowercase letter with parenthesis)
      const alineaMatch = line.match(/^([a-z])\\)\\s*(.*)/);
      if (alineaMatch && alineaMatch[2].length > 3) {
        const alineaNum = alineaMatch[1];
        const alineaText = alineaMatch[2].trim();
        this.addElement('alinea', line, { 
          numero: alineaNum, 
          texto: alineaText,
          id: `alinea-${currentArticle || '0'}-${currentInciso || '0'}-${alineaNum}`
        });
        continue;
      }
      
      // SUBALÍNEA (lowercase letters with parenthesis, 2+ chars - but this is rare in Brazilian law)
      const subalineaMatch = line.match(/^([a-z]{2,})\\)\\s*(.*)/);
      if (subalineaMatch && subalineaMatch[2].length > 3) {
        const subalineaNum = subalineaMatch[1];
        const subalineaText = subalineaMatch[2].trim();
        this.addElement('subalinea', line, { 
          numero: subalineaNum, 
          texto: subalineaText 
        });
        continue;
      }
      
      // ANEXO
      const anexoMatch = line.match(/^(ANEXO\\s+[IVX\\d-]+[AB]?)\\s*(.*)/i);
      if (anexoMatch) {
        const anexoNum = anexoMatch[1];
        const anexoText = anexoMatch[2] ? anexoMatch[2].trim() : '';
        this.addElement('anexo', line, { 
          numero: anexoNum, 
          texto: anexoText,
          id: `anexo-${anexoNum.replace(/\\s+/g, '-').toLowerCase()}`
        });
        continue;
      }
      
      // ASSINATURA / DATA
      if (/^(Prefeitura|Publicado|Ref\\.)/i.test(line) || /^[A-Z][a-z]+\\s+[A-Z][a-z]+$/i.test(line) && line.length < 40) {
        if (i > lines.length - 20) {
          this.addElement('assinatura', line);
          continue;
        }
      }
      
      // Regular text (continuation of previous element)
      if (this.elements.length > 0) {
        const last = this.elements[this.elements.length - 1];
        if (last.type === 'texto') {
          last.content += ' ' + line;
        } else {
          this.addElement('texto', line);
        }
      } else {
        this.addElement('texto', line);
      }
    }
  }

  addElement(type, content, meta = {}) {
    const el = { type, content, ...meta };
    this.elements.push(el);
    
    // Add to TOC for major elements
    if (['titulo', 'capitulo', 'secao', 'subsecao', 'artigo', 'anexo'].includes(type)) {
      this.toc.push({
        type,
        label: this.getTOCLabel(el),
        id: meta.id || '',
        level: this.getTOCLevel(type)
      });
    }
  }

  getTOCLabel(el) {
    switch(el.type) {
      case 'titulo': return `📖 ${el.content}`;
      case 'capitulo': return `📂 ${el.content}`;
      case 'secao': return `📁 ${el.content}`;
      case 'subsecao': return `📄 ${el.content}`;
      case 'artigo': return `§ Art. ${el.numero}`;
      case 'anexo': return `📎 ${el.content}`;
      default: return el.content;
    }
  }

  getTOCLevel(type) {
    const levels = { titulo: 0, capitulo: 1, secao: 2, subsecao: 3, artigo: 4, anexo: 1 };
    return levels[type] || 5;
  }
}

// ===== RENDERER =====

function renderDocument(data) {
  const content = document.getElementById('content');
  const tocContent = document.getElementById('tocContent');
  const tocSidebar = document.getElementById('tocSidebar');
  
  let html = '';
  let tocHtml = '';
  
  data.elements.forEach(el => {
    switch(el.type) {
      case 'titulo-documento':
        html += `<h1 class="leg-titulo" style="margin-top:0;">${escapeHtml(el.content)}</h1>`;
        break;
      case 'titulo':
        html += `<h2 class="leg-titulo" id="${el.id}">${escapeHtml(el.content)}</h2>`;
        break;
      case 'capitulo':
        html += `<h3 class="leg-capitulo" id="${el.id}">${escapeHtml(el.content)}</h3>`;
        break;
      case 'secao':
        html += `<h4 class="leg-secao" id="${el.id}">${escapeHtml(el.content)}</h4>`;
        break;
      case 'subsecao':
        html += `<h5 class="leg-subsecao" id="${el.id}">${escapeHtml(el.content)}</h5>`;
        break;
      case 'ementa':
        html += `<div class="leg-ementa">${escapeHtml(el.content)}</div>`;
        break;
      case 'preambulo':
        html += `<div class="leg-preambulo">${escapeHtml(el.content)}</div>`;
        break;
      case 'artigo':
        html += `<div class="leg-artigo" id="${el.id}">
          <div class="leg-artigo-header">Art. ${escapeHtml(el.numero)}</div>
          <div class="leg-texto">${escapeHtml(el.texto || el.content.replace(/^Art\.\\s*\\d+[º°]?\\s*/, ''))}</div>
        </div>`;
        break;
      case 'paragrafo':
        html += `<div class="leg-paragrafo" id="${el.id}">
          <span class="leg-paragrafo-header">§ ${escapeHtml(el.numero)}</span>
          <span class="leg-texto">${escapeHtml(el.texto || el.content.replace(/^§\\s*\\d+[º°]?\\s*/, '').replace(/^Parágrafo\\s+único\\.\\s*/, ''))}</span>
        </div>`;
        break;
      case 'inciso':
        html += `<div class="leg-inciso" id="${el.id}">
          <span class="leg-inciso-header">${escapeHtml(el.numero)} –</span>
          <span class="leg-texto">${escapeHtml(el.texto || el.content.replace(/^[IVX]+\\s*[-–—]\\s*/, ''))}</span>
        </div>`;
        break;
      case 'alinea':
        html += `<div class="leg-alinea">
          <span class="leg-alinea-header">${escapeHtml(el.numero)})</span>
          <span class="leg-texto">${escapeHtml(el.texto || el.content.replace(/^[a-z]\\)\\s*/, ''))}</span>
        </div>`;
        break;
      case 'subalinea':
        html += `<div class="leg-subalinea">
          <span class="leg-alinea-header">${escapeHtml(el.numero)})</span>
          <span class="leg-texto">${escapeHtml(el.texto || el.content.replace(/^[a-z]{2,}\\)\\s*/, ''))}</span>
        </div>`;
        break;
      case 'anexo':
        html += `<div class="leg-anexo" id="${el.id}">
          <div class="leg-anexo-header">${escapeHtml(el.content)}</div>
        </div>`;
        break;
      case 'assinatura':
        html += `<div class="leg-assinatura">${escapeHtml(el.content)}</div>`;
        break;
      case 'texto':
        html += `<p class="leg-texto">${escapeHtml(el.content)}</p>`;
        break;
    }
  });
  
  // Build TOC
  data.toc.forEach(item => {
    const className = item.type;
    tocHtml += `<div class="toc-item ${className}" onclick="scrollToElement('${item.id}')" title="${escapeHtml(item.label)}">${escapeHtml(item.label)}</div>`;
  });
  
  content.innerHTML = html;
  tocContent.innerHTML = tocHtml;
  
  if (data.toc.length > 0) {
    tocSidebar.style.display = 'block';
  }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function scrollToElement(id) {
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ===== UI CONTROLS =====

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const content = document.getElementById('content');
const emptyState = document.getElementById('emptyState');
const dropZoneContainer = document.getElementById('dropZoneContainer');

// Drag & drop
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
  fileName.textContent = '📄 ' + file.name;
  const reader = new FileReader();
  
  reader.onload = (e) => {
    try {
      const parser = new LegislationParser();
      const data = parser.parse(e.target.result);
      
      emptyState.style.display = 'none';
      content.style.display = 'block';
      dropZoneContainer.style.display = 'none';
      
      renderDocument(data);
    } catch (err) {
      console.error(err);
      alert('Erro ao processar arquivo: ' + err.message);
    }
  };
  
  reader.readAsText(file);
}

// Font size
function setFontSize(size) {
  document.querySelectorAll('.header-controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  const paper = document.getElementById('paper');
  paper.classList.remove('fs-small', 'fs-medium', 'fs-large');
  paper.classList.add('fs-' + size);
}

// Theme
let darkMode = false;
function toggleTheme() {
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = darkMode ? '☀️ Claro' : '🌙 Escuro';
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'o') {
      e.preventDefault();
      fileInput.click();
    } else if (e.key === 'p') {
      e.preventDefault();
      window.print();
    }
  }
});
</script>
